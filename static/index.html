<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MODELO DE NEGOCIOS IA</title>
    <link rel="stylesheet" href="/static/style.css">
    <!-- Librerías locales para funcionar 100% sin internet -->
    <script src="/static/marked.min.js"></script>
    <script src="/static/mermaid.min.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar / Header Area -->
        <header class="header">
            <div class="logo">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 512" width="1em" height="1em" fill="currentColor"><path d="M320 0c17.7 0 32 14.3 32 32V96H472c39.8 0 72 32.2 72 72V440c0 39.8-32.2 72-72 72H168c-39.8 0-72-32.2-72-72V168c0-39.8 32.2-72 72-72H288V32c0-17.7 14.3-32 32-32zM208 384c-8.8 0-16 7.2-16 16s7.2 16 16 16h32c8.8 0 16-7.2 16-16s-7.2-16-16-16H208zm112 0c-8.8 0-16 7.2-16 16s7.2 16 16 16h32c8.8 0 16-7.2 16-16s-7.2-16-16-16H320zm112 0c-8.8 0-16 7.2-16 16s7.2 16 16 16h32c8.8 0 16-7.2 16-16s-7.2-16-16-16H432zM256 272c0-17.7-14.3-32-32-32s-32 14.3-32 32s14.3 32 32 32s32-14.3 32-32zm192 0c0-17.7-14.3-32-32-32s-32 14.3-32 32s14.3 32 32 32s32-14.3 32-32z"/></svg> MODELO DE NEGOCIOS IA
            </div>
            <div class="status" id="status-indicator">
                <span class="status-dot"></span>
                <span class="status-text">Inicializando sistema...</span>
            </div>
        </header>

        <!-- Chat Area -->
        <main class="chat-container" id="chat-container">
            <!-- Welcome Message -->
            <div class="message system-message">
                <div class="message-content">
                    <div class="message-header">Sistema</div>
                    <div class="message-body">
                        Hola soy tu sistema que modela tu negocio en que puedo ayudarte en tu negocio
                    </div>
                </div>
            </div>
            <!-- Dynamic messages will appear here -->
        </main>

        <!-- Input Area -->
        <footer class="input-area">
            <form id="chat-form" class="input-form">
                <label for="file-upload" class="upload-button" title="Adjuntar PDF">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 448 512" width="1.2em" height="1.2em" fill="currentColor"><path d="M364.2 83.8c-24.4-24.4-64-24.4-88.4 0l-184 184c-42.1 42.1-42.1 110.3 0 152.4s110.3 42.1 152.4 0l152-152c10.9-10.9 28.7-10.9 39.6 0s10.9 28.7 0 39.6l-152 152c-64 64-167.6 64-231.6 0s-64-167.6 0-231.6l184-184c46.3-46.3 121.3-46.3 167.6 0s46.3 121.3 0 167.6l-176 176c-28.6 28.6-75 28.6-103.6 0s-28.6-75 0-103.6l144-144c10.9-10.9 28.7-10.9 39.6 0s10.9 28.7 0 39.6l-144 144c-6.7 6.7-6.7 17.7 0 24.4s17.7 6.7 24.4 0l176-176c24.4-24.4 24.4-64 0-88.4z"/></svg>
                </label>
                <input type="file" id="file-upload" accept=".pdf" style="display: none;">
                
                <input 
                    type="text" 
                    id="user-input" 
                    class="message-input" 
                    placeholder="Escribe tu pregunta..." 
                    autocomplete="off" 
                    required>
                <button type="submit" id="send-button" class="send-button">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="1.2em" height="1.2em" fill="currentColor"><path d="M498.1 5.6c10.1 7 15.4 19.1 13.5 31.2l-64 416c-1.5 9.7-7.4 18.2-16 23s-18.9 5.4-28 1.6L284 427.7l-68.5 74.1c-8.9 9.7-22.9 12.9-35.2 8.1S160 493.2 160 480V396.4c0-4 1.5-7.8 4.2-10.7L331.8 202.8c5.8-6.3 5.6-16-.4-22s-15.7-6.4-22-.7L106 360.8 17.7 316.6C7.1 311.3 .3 300.7 0 288.9s5.9-22.8 16.1-28.7l448-256c10.7-6.1 23.9-5.5 34 1.4z"/></svg>
                </button>
            </form>
            <div class="watermark">Hecho por Marco Obispo - UNI - Sistemas Analiticos</div>
        </footer>
    </div>
    <script src="/static/script.js"></script>
</body>
</html>
